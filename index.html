<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cadastro</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

input {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 12px;
  background: green;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: darkgreen;
}
</style>
</head>

<body>

<div class="container">

<h2>Cadastro</h2>

<input id="nome" placeholder="Nome">
<input id="cep" placeholder="CEP (somente números)">
<input id="rua" placeholder="Rua">
<input id="numero" placeholder="Número">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="uf" placeholder="UF">
<input id="data_nascimento" type="date">
<input id="cpf" placeholder="CPF">

<button onclick="enviar()">Enviar</button>

</div>

<script>

// 🔥 espera carregar
window.onload = () => {

  // 🔥 busca CEP
  document.getElementById("cep").addEventListener("blur", async () => {
    const cep = document.getElementById("cep").value.replace(/\D/g, '');

    if (cep.length === 8) {
      try {
        const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const data = await res.json();

        if (!data.erro) {
          document.getElementById("rua").value = data.logradouro;
          document.getElementById("bairro").value = data.bairro;
          document.getElementById("cidade").value = data.localidade;
          document.getElementById("uf").value = data.uf;
        } else {
          alert("CEP não encontrado");
        }

      } catch (e) {
        alert("Erro ao buscar CEP");
      }
    }
  });

};

// 🚀 enviar
async function enviar() {

  const dados = {
    nome: document.getElementById("nome").value,
    cep: document.getElementById("cep").value,
    rua: document.getElementById("rua").value,
    numero: document.getElementById("numero").value,
    bairro: document.getElementById("bairro").value,
    cidade: document.getElementById("cidade").value,
    uf: document.getElementById("uf").value,
    data_nascimento: document.getElementById("data_nascimento").value,
    cpf: document.getElementById("cpf").value
  };

  try {
    const res = await fetch("https://api-cadastro-a8ba.onrender.com/salvar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(dados)
    });

    const resposta = await res.json();

    if (resposta.status === "salvo") {
      alert("Salvo com sucesso!");
    } else {
      alert("Erro ao salvar");
    }

  } catch (e) {
    alert("Erro na conexão com API");
  }
}

</script>

</body>
</html>

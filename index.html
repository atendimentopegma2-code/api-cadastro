<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;

  background: linear-gradient(135deg, #4CAF50, #2E7D32);

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
}

/* CARD */
.container {
  width: 92%;
  max-width: 420px;

  background: white;
  padding: 25px;
  border-radius: 12px;

  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #2E7D32;
}

/* CAMPOS */
.input-group {
  margin-bottom: 12px;
}

input {
  width: 100%;
  padding: 12px;

  border: 1px solid #ccc;
  border-radius: 6px;

  font-size: 16px;
}

/* BOTÃO */
button {
  width: 100%;
  padding: 14px;

  background: #2E7D32;
  color: white;

  border: none;
  border-radius: 6px;

  font-size: 16px;
  cursor: pointer;

  transition: 0.3s;
}

button:hover {
  background: #1b5e20;
}

button:disabled {
  background: gray;
}

/* LOADING */
.loading {
  text-align: center;
  font-size: 14px;
  margin-top: 10px;
  display: none;
}
</style>
</head>

<body>

<div class="container">

<h2>Cadastro</h2>

<div class="input-group"><input id="nome" placeholder="Nome"></div>
<div class="input-group"><input id="cep" placeholder="CEP"></div>
<div class="input-group"><input id="rua" placeholder="Rua"></div>
<div class="input-group"><input id="numero" placeholder="Número"></div>
<div class="input-group"><input id="bairro" placeholder="Bairro"></div>
<div class="input-group"><input id="cidade" placeholder="Cidade"></div>
<div class="input-group"><input id="uf" placeholder="UF"></div>
<div class="input-group"><input id="data_nascimento" type="date"></div>
<div class="input-group"><input id="cpf" placeholder="CPF"></div>

<button id="btn" onclick="enviar()">Enviar</button>

<div class="loading" id="loading">Enviando...</div>

</div>

<script>

// 🔥 MÁSCARA CEP
document.getElementById("cep").addEventListener("input", function(e) {
  let v = e.target.value.replace(/\D/g, '').slice(0,8);
  if (v.length > 5) v = v.replace(/(\d{5})(\d+)/, '$1-$2');
  e.target.value = v;
});

// 🔥 MÁSCARA CPF
document.getElementById("cpf").addEventListener("input", function(e) {
  let v = e.target.value.replace(/\D/g, '').slice(0,11);
  v = v.replace(/(\d{3})(\d)/, '$1.$2');
  v = v.replace(/(\d{3})(\d)/, '$1.$2');
  v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
  e.target.value = v;
});

// 🔥 BUSCAR CEP
document.getElementById("cep").addEventListener("blur", async function() {

  let cep = this.value.replace(/\D/g, '');
  if (cep.length !== 8) return;

  try {
    const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
    const dados = await res.json();

    if (!dados.erro) {
      document.getElementById("rua").value = dados.logradouro;
      document.getElementById("bairro").value = dados.bairro;
      document.getElementById("cidade").value = dados.localidade;
      document.getElementById("uf").value = dados.uf;
    }
  } catch {
    console.log("Erro CEP");
  }
});

// 🔥 VALIDAR
function validar() {
  if (!nome.value || !cpf.value || !cep.value) {
    alert("Preencha os campos obrigatórios!");
    return false;
  }
  return true;
}

// 🔥 ENVIAR
async function enviar() {

  if (!validar()) return;

  const btn = document.getElementById("btn");
  const loading = document.getElementById("loading");

  btn.disabled = true;
  loading.style.display = "block";

  const dados = {
    nome: nome.value,
    cep: cep.value,
    rua: rua.value,
    numero: numero.value,
    bairro: bairro.value,
    cidade: cidade.value,
    uf: uf.value,
    data_nascimento: data_nascimento.value,
    cpf: cpf.value
  };

  try {
    const res = await fetch("https://api-cadastro-a8ba.onrender.com/salvar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(dados)
    });

    const resposta = await res.json();

    if (resposta.status === "salvo") {
      alert("Salvo com sucesso!");
    } else {
      alert("Erro ao salvar");
    }

  } catch {
    alert("Erro na API");
  }

  btn.disabled = false;
  loading.style.display = "none";
}

</script>

</body>
</html>

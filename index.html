<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>

<style>

/* ============================= */
/* FUNDO */
/* ============================= */
body {
    margin: 0;
    font-family: Arial, sans-serif;

    background: linear-gradient(135deg, #e0a800, #ffd24d);

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* ============================= */
/* CONTAINER */
/* ============================= */
.container {
    width: 95%;
    max-width: 420px;

    background: white;
    padding: 20px;
    border-radius: 12px;

    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* ============================= */
/* LOGO */
/* ============================= */
.logo {
    width: 100%;
    max-width: 180px;
    display: block;
    margin: 0 auto 15px auto;
}

/* ============================= */
/* TITULO */
/* ============================= */
h2 {
    text-align: center;
    margin-bottom: 15px;
}

/* ============================= */
/* INPUTS */
/* ============================= */
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;

    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* ============================= */
/* BOTÃO */
/* ============================= */
button {
    width: 100%;
    padding: 12px;

    background: #28a745;
    color: white;

    border: none;
    border-radius: 6px;

    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #218838;
}

/* ============================= */
/* RESPONSIVO */
/* ============================= */
@media (max-width: 600px) {
    body {
        padding: 20px;
    }

    .container {
        width: 100%;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo">

    <h2>Cadastro</h2>

    <input id="nome" placeholder="Nome">
    <input id="cep" placeholder="CEP (somente números)">
    <input id="rua" placeholder="Rua">
    <input id="numero" placeholder="Número">
    <input id="bairro" placeholder="Bairro">
    <input id="cidade" placeholder="Cidade">
    <input id="uf" placeholder="UF">
    <input id="data" type="date">
    <input id="cpf" placeholder="CPF">

    <button onclick="enviar()">Enviar</button>

</div>

<script>

/* ============================= */
/* BUSCA CEP */
/* ============================= */
document.getElementById("cep").addEventListener("blur", async () => {

    let cep = document.getElementById("cep").value.replace(/\D/g, '');

    if (cep.length !== 8) return;

    try {
        let res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        let data = await res.json();

        document.getElementById("rua").value = data.logradouro || "";
        document.getElementById("bairro").value = data.bairro || "";
        document.getElementById("cidade").value = data.localidade || "";
        document.getElementById("uf").value = data.uf || "";

    } catch (erro) {
        alert("Erro ao buscar CEP");
    }
});

/* ============================= */
/* ENVIO PARA API */
/* ============================= */
async function enviar() {

    const dados = {
        nome: document.getElementById("nome").value,
        cep: document.getElementById("cep").value,
        rua: document.getElementById("rua").value,
        numero: document.getElementById("numero").value,
        bairro: document.getElementById("bairro").value,
        cidade: document.getElementById("cidade").value,
        uf: document.getElementById("uf").value,
        data: document.getElementById("data").value,
        cpf: document.getElementById("cpf").value
    };

    try {
        const res = await fetch("https://seu-site-do-render.onrender.com/salvar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(dados)
        });

        if (res.ok) {
            alert("Salvo com sucesso!");
        } else {
            alert("Erro na API");
        }

    } catch (erro) {
        alert("Erro ao conectar com servidor");
    }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e0a800, #ffd24d);

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 95%;
    max-width: 420px;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.logo {
    width: 100%;
    max-width: 180px;
    display: block;
    margin: 0 auto 15px auto;
}

h2 {
    text-align: center;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.lgpd {
    font-size: 12px;
    color: #555;
    margin-bottom: 10px;
    text-align: center;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #e0a800, #ffd24d);
    color: #333;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: linear-gradient(135deg, #cc9500, #e6b800);
}

@media (max-width: 600px) {
    body {
        padding: 20px;
    }

    .container {
        width: 100%;
    }
}

</style>
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo">

    <h2>Cadastro</h2>

    <input id="nome" placeholder="Nome">
    <input id="cep" placeholder="CEP (somente números)">
    <input id="rua" placeholder="Rua">
    <input id="numero" placeholder="Número">
    <input id="bairro" placeholder="Bairro">
    <input id="cidade" placeholder="Cidade">
    <input id="uf" placeholder="UF">
    <input id="data" type="date">
    <input id="cpf" placeholder="CPF">

    <!-- 🔐 LGPD -->
    <p class="lgpd">
        Ao clicar em "Enviar", você concorda com a coleta e o uso dos seus dados para fins de cadastro, conforme a Lei Geral de Proteção de Dados (LGPD).
    </p>

    <button onclick="enviar()">Enviar</button>

</div>

<script>

/* ================= CEP ================= */
document.getElementById("cep").addEventListener("blur", async () => {

    let cep = document.getElementById("cep").value.replace(/\D/g, '');

    if (cep.length !== 8) return;

    try {
        let res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        let data = await res.json();

        document.getElementById("rua").value = data.logradouro || "";
        document.getElementById("bairro").value = data.bairro || "";
        document.getElementById("cidade").value = data.localidade || "";
        document.getElementById("uf").value = data.uf || "";

    } catch {
        alert("Erro ao buscar CEP");
    }
});

/* ================= ENVIO ================= */
async function enviar() {

    const dados = {
        nome: document.getElementById("nome").value,
        cep: document.getElementById("cep").value,
        rua: document.getElementById("rua").value,
        numero: document.getElementById("numero").value,
        bairro: document.getElementById("bairro").value,
        cidade: document.getElementById("cidade").value,
        uf: document.getElementById("uf").value,
        data: document.getElementById("data").value,
        cpf: document.getElementById("cpf").value
    };

    try {
        const res = await fetch("https://api-cadastro-a8ba.onrender.com/salvar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(dados)
        });

        const resposta = await res.json();

        if (res.ok) {
            alert("Salvo com sucesso!");

            // 🔥 limpa formulário
            document.querySelectorAll("input").forEach(i => i.value = "");

        } else {
            alert("Erro na API");
        }

    } catch {
        alert("Erro ao conectar com servidor");
    }
}

</script>

</body>
</html>
</html>
